<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Medicinal Plant Analysis</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
</head>
<body>
    <header class="navbar">
        <div class="logo">🌿 Sri's AyurMedic</div>
        <nav>
            <ul>
                <li><a href="#diseases">Diseases</a></li>
                <li><a href="#plants">Plants</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="search-section">
            <h1>Find Natural Healing 🌱</h1>
            <div class="search-controls">
                <div class="input-container">
                    <input type="text" id="searchInput" placeholder="Search Disease (e.g., Fever, Cold, Headache)" onkeyup="filterDiseaseCards()"/>
                    <span class="material-symbols-outlined clear-btn" onclick="clearSearch()">close</span>
                </div>
                
                <button class="m3-btn mic-btn" onclick="startVoiceSearch()">
                    <span class="material-symbols-outlined">mic</span>
                </button>
                <button class="m3-btn" onclick="filterDiseaseCards()">Filter</button> 
            </div>
            <p id="noResultsMessage" style="color: #c0392b; font-weight: 500; margin-top: 10px; display: none;">No diseases matched your search.</p>
        </section>

        <section id="diseases" class="cards-section">
            <h2>Common Conditions</h2>
            <div class="card-container" id="diseaseCards"></div>
        </section>

        <section id="plants" class="cards-section">
            <h2>Medicinal Plant Suggestions</h2>
            <div class="card-container" id="plantCards"></div>
        </section>
    </main>

    <footer>
        <p>© 2025 AyurMedic | Natural Healing with Plants</p>
    </footer>

    <div id="dialogOverlay" class="dialog-overlay">
        <div class="dialog">
            <div class="dialog-header">
                <h2 id="dialogTitle">Plant Details</h2>
                <span class="material-symbols-outlined close-btn" onclick="closeDialog()">close</span>
            </div>
            <div class="dialog-content" id="dialogContent"></div>
            <div class="dialog-actions">
                <button class="m3-btn" onclick="closeDialog()">OK</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
